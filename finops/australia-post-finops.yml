meters:
  - name: shipments_created
    unit: shipment
    aggregation: sum
    dimensions:
      - service_class
      - destination_zone
      - weight_band
      - dangerous_goods
    apis:
      - australia-post:shipping-and-tracking
  - name: labels_printed
    unit: label
    aggregation: sum
    dimensions:
      - label_format
    apis:
      - australia-post:shipping-and-tracking
  - name: return_labels_created
    unit: label
    aggregation: sum
    apis:
      - australia-post:shipping-and-tracking
  - name: postage_rate_lookups
    unit: request
    aggregation: sum
    apis:
      - australia-post:postage-assessment-calculator
    cost: 0
  - name: location_lookups
    unit: request
    aggregation: sum
    apis:
      - australia-post:locations
    cost: 0
  - name: delivery_events_reported
    unit: event
    aggregation: sum
    apis:
      - australia-post:delivery-partner
principles:
  - name: Visibility
    description: Map each API call to Australia Post account billing line items by
      correlating shipment IDs returned by the Shipping and Tracking API with charges
      on the monthly eParcel/StarTrack account statement.
  - name: Allocation
    description: Tag shipments with order reference, business unit, or cost-centre
      metadata in API request payloads to enable chargeback and showback reporting
      at the shipment level.
  - name: Optimization
    description: Analyse service-class mix — compare Express Post vs Standard parcels
      vs StarTrack — to identify opportunities to shift lower-urgency shipments to
      cheaper services. Use the Postage Assessment Calculator API (free) in pre-checkout
      flows to show customers real-time rates without incurring production shipment costs.
  - name: Accountability
    description: Reconcile monthly Australia Post invoices against shipment counts
      from the Shipping and Tracking API. Investigate variance between lodged and
      billed shipments; check for voided labels or manifesting errors. Track dangerous
      goods surcharges separately.
