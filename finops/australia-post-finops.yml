specification: FinOps Framework
specificationVersion: '1.0'
schema: https://www.finops.org/framework/
provider: Australia Post
providerId: australia-post
created: '2026-06-13'
modified: '2026-06-13'
reconciled: true
tags:
  - FinOps
  - Cost Management
  - FOCUS
  - Postal
  - Logistics / Shipping
description: FOCUS-aligned FinOps for Australia Post APIs. Free APIs (Postage Assessment
  Calculator, Locations) carry no API-level cost. Contract APIs (Shipping and Tracking,
  Delivery Choices) tie API usage directly to Australia Post postage spend — each
  shipment lodged via the API generates a charge at the contracted eParcel or StarTrack
  rate, billed through the customer's Australia Post account. Delivery Partner API
  cost is governed by the partner agreement. Total API-driven spend is therefore dominated
  by volume of shipments created, service class selected, weight, dimensions, and
  destination.
sources:
  - https://auspost.com.au/integrate-shipping-and-tracking-apis
  - https://auspost.com.au/developers/help-support/
alignedWith:
  framework: FinOps Foundation Framework
  frameworkUrl: https://www.finops.org/framework/
  dataSpec: FOCUS
  dataSpecVersion: '1.3'
  dataSpecUrl: https://focus.finops.org/focus-specification/v1-3/
publisherName: Australia Post
serviceCategory: Logistics / Shipping
billingModel:
  pricingCategory: Postage Metered + Free Tier
  billingFrequency: Account Invoice (typically monthly)
  billingCurrency: AUD
  chargeCategories:
    - Usage
    - Adjustment
    - Credit
focusColumns:
  ServiceName: Australia Post API
  ServiceCategory: Logistics / Shipping
  ProviderName: Australia Post
  PublisherName: Australia Post
  InvoiceIssuerName: Australia Post Group Pty Ltd
