aid: australia-post
name: Australia Post
description: Australia Post is Australia's primary postal operator, offering a developer
  platform with REST APIs for e-commerce merchants, logistics providers, and delivery
  partners. APIs cover shipping label creation, parcel tracking, postage calculation,
  parcel locker and post office location lookup, delivery choice and scheduling, and
  delivery partner event reporting for an integrated end-to-end fulfilment ecosystem.
